<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>To-Do</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font: 16px/1.4 system-ui, sans-serif;
      background: #f4f4f5;
      color: #18181b;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 2rem 1rem;
    }
    main {
      width: 100%;
      max-width: 420px;
    }
    h1 { font-size: 1.5rem; margin-bottom: 1rem; }
    form { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
    input[type="text"] {
      flex: 1;
      padding: 0.6rem 0.75rem;
      border: 1px solid #d4d4d8;
      border-radius: 6px;
      font: inherit;
    }
    input[type="text"]:focus { outline: 2px solid #3b82f6; border-color: transparent; }
    button {
      padding: 0.6rem 0.9rem;
      border: none;
      border-radius: 6px;
      font: inherit;
      cursor: pointer;
      background: #3b82f6;
      color: #fff;
    }
    button:hover { background: #2563eb; }
    button.ghost { background: transparent; color: #71717a; padding: 0.25rem 0.5rem; }
    button.ghost:hover { color: #ef4444; }
    ul { list-style: none; }
    li {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.6rem 0;
      border-bottom: 1px solid #e4e4e7;
    }
    li.done span { text-decoration: line-through; color: #a1a1aa; }
    li span { flex: 1; word-break: break-word; }
    .empty { color: #a1a1aa; text-align: center; padding: 2rem 0; }
    footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 0.75rem;
      font-size: 0.875rem;
      color: #71717a;
    }
    footer button { background: #e4e4e7; color: #52525b; font-size: 0.8rem; padding: 0.35rem 0.6rem; }
    footer button:hover { background: #d4d4d8; }
  </style>
</head>
<body>
  <main>
    <h1>To-Do</h1>
    <form id="form">
      <input id="input" type="text" placeholder="Add a task…" autocomplete="off" autofocus>
      <button type="submit">Add</button>
    </form>
    <ul id="list"></ul>
    <footer id="footer" hidden>
      <span id="count"></span>
      <button type="button" id="clear">Clear done</button>
    </footer>
  </main>
  <script>
    const KEY = 'todo-planner';
    let tasks = JSON.parse(localStorage.getItem(KEY) || '[]');

    const $ = id => document.getElementById(id);
    const form = $('form'), input = $('input'), list = $('list');
    const footer = $('footer'), count = $('count'), clearBtn = $('clear');

    const save = () => localStorage.setItem(KEY, JSON.stringify(tasks));

    const render = () => {
      list.innerHTML = '';
      if (!tasks.length) {
        list.innerHTML = '<li class="empty">No tasks yet</li>';
        footer.hidden = true;
        return;
      }
      footer.hidden = false;
      const left = tasks.filter(t => !t.done).length;
      count.textContent = left + (left === 1 ? ' task left' : ' tasks left');

      const frag = document.createDocumentFragment();
      for (const t of tasks) {
        const li = document.createElement('li');
        if (t.done) li.className = 'done';
        li.innerHTML =
          '<input type="checkbox"' + (t.done ? ' checked' : '') + '>' +
          '<span></span><button type="button" class="ghost">✕</button>';
        li.querySelector('span').textContent = t.text;
        li.querySelector('input').onchange = () => { t.done = !t.done; save(); render(); };
        li.querySelector('button').onclick = () => { tasks = tasks.filter(x => x !== t); save(); render(); };
        frag.appendChild(li);
      }
      list.appendChild(frag);
    };

    form.onsubmit = e => {
      e.preventDefault();
      const text = input.value.trim();
      if (!text) return;
      tasks.push({ text, done: false });
      input.value = '';
      save();
      render();
    };

    clearBtn.onclick = () => {
      tasks = tasks.filter(t => !t.done);
      save();
      render();
    };

    render();
  </script>
</body>
</html>
