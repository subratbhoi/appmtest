<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List Planner</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-purple-50 to-blue-50 min-h-screen">
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [todos, setTodos] = useState(() => {
                const saved = localStorage.getItem('todos');
                return saved ? JSON.parse(saved) : [];
            });
            const [inputValue, setInputValue] = useState('');
            const [filter, setFilter] = useState('all');

            useEffect(() => {
                localStorage.setItem('todos', JSON.stringify(todos));
            }, [todos]);

            const addTodo = (e) => {
                e.preventDefault();
                if (!inputValue.trim()) return;
                
                const newTodo = {
                    id: Date.now(),
                    text: inputValue.trim(),
                    completed: false,
                    createdAt: new Date().toISOString()
                };
                
                setTodos([...todos, newTodo]);
                setInputValue('');
            };

            const toggleTodo = (id) => {
                setTodos(todos.map(todo => 
                    todo.id === id ? { ...todo, completed: !todo.completed } : todo
                ));
            };

            const deleteTodo = (id) => {
                setTodos(todos.filter(todo => todo.id !== id));
            };

            const clearCompleted = () => {
                setTodos(todos.filter(todo => !todo.completed));
            };

            const filteredTodos = todos.filter(todo => {
                if (filter === 'active') return !todo.completed;
                if (filter === 'completed') return todo.completed;
                return true;
            });

            const activeCount = todos.filter(todo => !todo.completed).length;
            const completedCount = todos.filter(todo => todo.completed).length;

            return (
                <div className="min-h-screen py-12 px-4">
                    <div className="max-w-xl mx-auto">
                        <div className="bg-white rounded-2xl shadow-xl overflow-hidden">
                            {/* Header */}
                            <div className="bg-gradient-to-r from-purple-600 to-blue-600 px-6 py-8">
                                <h1 className="text-3xl font-bold text-white text-center">To-Do List Planner</h1>
                                <p className="text-purple-100 text-center mt-2">Stay organized, get things done</p>
                            </div>

                            {/* Input Form */}
                            <form onSubmit={addTodo} className="p-6 border-b border-gray-100">
                                <div className="flex gap-3">
                                    <input
                                        type="text"
                                        value={inputValue}
                                        onChange={(e) => setInputValue(e.target.value)}
                                        placeholder="What needs to be done?"
                                        className="flex-1 px-4 py-3 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent transition"
                                    />
                                    <button
                                        type="submit"
                                        className="px-6 py-3 bg-gradient-to-r from-purple-600 to-blue-600 text-white font-semibold rounded-xl hover:opacity-90 transition focus:outline-none focus:ring-2 focus:ring-purple-500 focus:ring-offset-2"
                                    >
                                        Add
                                    </button>
                                </div>
                            </form>

                            {/* Filters */}
                            <div className="px-6 py-4 border-b border-gray-100 flex gap-2">
                                {['all', 'active', 'completed'].map((f) => (
                                    <button
                                        key={f}
                                        onClick={() => setFilter(f)}
                                        className={`px-4 py-2 rounded-lg font-medium capitalize transition ${
                                            filter === f
                                                ? 'bg-purple-100 text-purple-700'
                                                : 'text-gray-600 hover:bg-gray-100'
                                        }`}
                                    >
                                        {f}
                                    </button>
                                ))}
                                {completedCount > 0 && (
                                    <button
                                        onClick={clearCompleted}
                                        className="ml-auto px-4 py-2 text-red-600 hover:bg-red-50 rounded-lg font-medium transition"
                                    >
                                        Clear Completed
                                    </button>
                                )}
                            </div>

                            {/* Todo List */}
                            <div className="p-6">
                                {filteredTodos.length === 0 ? (
                                    <div className="text-center py-12 text-gray-400">
                                        <svg className="w-16 h-16 mx-auto mb-4 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
                                        </svg>
                                        <p className="text-lg">No tasks yet</p>
                                        <p className="text-sm">Add a task above to get started!</p>
                                    </div>
                                ) : (
                                    <ul className="space-y-3">
                                        {filteredTodos.map((todo) => (
                                            <li
                                                key={todo.id}
                                                className={`flex items-center gap-4 p-4 rounded-xl border transition ${
                                                    todo.completed
                                                        ? 'bg-gray-50 border-gray-100'
                                                        : 'bg-white border-gray-200 hover:border-purple-300'
                                                }`}
                                            >
                                                <button
                                                    onClick={() => toggleTodo(todo.id)}
                                                    className={`w-6 h-6 rounded-full border-2 flex items-center justify-center transition ${
                                                        todo.completed
                                                            ? 'bg-green-500 border-green-500 text-white'
                                                            : 'border-gray-300 hover:border-purple-500'
                                                    }`}
                                                >
                                                    {todo.completed && (
                                                        <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={3} d="M5 13l4 4L19 7" />
                                                        </svg>
                                                    )}
                                                </button>
                                                <span
                                                    className={`flex-1 text-lg ${
                                                        todo.completed
                                                            ? 'text-gray-400 line-through'
                                                            : 'text-gray-700'
                                                    }`}
                                                >
                                                    {todo.text}
                                                </span>
                                                <button
                                                    onClick={() => deleteTodo(todo.id)}
                                                    className="p-2 text-gray-400 hover:text-red-500 hover:bg-red-50 rounded-lg transition"
                                                >
                                                    <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                                                    </svg>
                                                </button>
                                            </li>
                                        ))}
                                    </ul>
                                )}
                            </div>

                            {/* Footer Stats */}
                            <div className="px-6 py-4 bg-gray-50 border-t border-gray-100">
                                <div className="flex justify-between text-sm text-gray-600">
                                    <span>{activeCount} task{activeCount !== 1 ? 's' : ''} remaining</span>
                                    <span>{completedCount} completed</span>
                                </div>
                            </div>
                        </div>

                        <p className="text-center text-gray-400 text-sm mt-6">
                            Data is saved locally in your browser
                        </p>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
