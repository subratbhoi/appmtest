<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Calculator</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-indigo-50 to-purple-50 min-h-screen">
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState } = React;

        function App() {
            const [display, setDisplay] = useState('0');
            const [previousValue, setPreviousValue] = useState(null);
            const [operation, setOperation] = useState(null);
            const [waitingForOperand, setWaitingForOperand] = useState(false);

            const inputDigit = (digit) => {
                if (waitingForOperand) {
                    setDisplay(digit);
                    setWaitingForOperand(false);
                } else {
                    setDisplay(display === '0' ? digit : display + digit);
                }
            };

            const inputDecimal = () => {
                if (waitingForOperand) {
                    setDisplay('0.');
                    setWaitingForOperand(false);
                } else if (display.indexOf('.') === -1) {
                    setDisplay(display + '.');
                }
            };

            const clear = () => {
                setDisplay('0');
                setPreviousValue(null);
                setOperation(null);
                setWaitingForOperand(false);
            };

            const performOperation = (nextOperation) => {
                const inputValue = parseFloat(display);

                if (previousValue === null) {
                    setPreviousValue(inputValue);
                } else if (operation) {
                    const result = calculate(previousValue, inputValue, operation);
                    setDisplay(String(result));
                    setPreviousValue(result);
                }

                setWaitingForOperand(true);
                setOperation(nextOperation);
            };

            const calculate = (firstValue, secondValue, operation) => {
                switch (operation) {
                    case '+':
                        return firstValue + secondValue;
                    case '-':
                        return firstValue - secondValue;
                    case '×':
                        return firstValue * secondValue;
                    case '÷':
                        return secondValue !== 0 ? firstValue / secondValue : 'Error';
                    default:
                        return secondValue;
                }
            };

            const handleEqual = () => {
                const inputValue = parseFloat(display);

                if (previousValue !== null && operation) {
                    const result = calculate(previousValue, inputValue, operation);
                    setDisplay(String(result));
                    setPreviousValue(null);
                    setOperation(null);
                    setWaitingForOperand(true);
                }
            };

            const handlePercent = () => {
                const value = parseFloat(display);
                setDisplay(String(value / 100));
            };

            const handleSign = () => {
                const value = parseFloat(display);
                setDisplay(String(value * -1));
            };

            const Button = ({ onClick, className, children }) => (
                <button
                    onClick={onClick}
                    className={`p-4 text-xl font-semibold rounded-xl transition transform active:scale-95 focus:outline-none focus:ring-2 focus:ring-purple-500 focus:ring-offset-2 ${className}`}
                >
                    {children}
                </button>
            );

            return (
                <div className="min-h-screen py-12 px-4">
                    <div className="max-w-sm mx-auto">
                        <div className="bg-white rounded-3xl shadow-2xl overflow-hidden">
                            {/* Header */}
                            <div className="bg-gradient-to-r from-indigo-600 to-purple-600 px-6 py-6">
                                <h1 className="text-2xl font-bold text-white text-center">Calculator</h1>
                            </div>

                            {/* Display */}
                            <div className="bg-gray-900 px-6 py-8">
                                <div className="text-right text-gray-400 text-sm mb-2">
                                    {previousValue !== null ? `${previousValue} ${operation || ''}` : ''}
                                </div>
                                <div className="text-right text-white text-5xl font-light tracking-tight">
                                    {display}
                                </div>
                            </div>

                            {/* Buttons */}
                            <div className="p-6 grid grid-cols-4 gap-3">
                                <Button
                                    onClick={clear}
                                    className="bg-red-100 text-red-600 hover:bg-red-200"
                                >
                                    AC
                                </Button>
                                <Button
                                    onClick={handleSign}
                                    className="bg-gray-100 text-gray-700 hover:bg-gray-200"
                                >
                                    +/-
                                </Button>
                                <Button
                                    onClick={handlePercent}
                                    className="bg-gray-100 text-gray-700 hover:bg-gray-200"
                                >
                                    %
                                </Button>
                                <Button
                                    onClick={() => performOperation('÷')}
                                    className="bg-purple-600 text-white hover:bg-purple-700"
                                >
                                    ÷
                                </Button>

                                <Button
                                    onClick={() => inputDigit('7')}
                                    className="bg-gray-100 text-gray-700 hover:bg-gray-200"
                                >
                                    7
                                </Button>
                                <Button
                                    onClick={() => inputDigit('8')}
                                    className="bg-gray-100 text-gray-700 hover:bg-gray-200"
                                >
                                    8
                                </Button>
                                <Button
                                    onClick={() => inputDigit('9')}
                                    className="bg-gray-100 text-gray-700 hover:bg-gray-200"
                                >
                                    9
                                </Button>
                                <Button
                                    onClick={() => performOperation('×')}
                                    className="bg-purple-600 text-white hover:bg-purple-700"
                                >
                                    ×
                                </Button>

                                <Button
                                    onClick={() => inputDigit('4')}
                                    className="bg-gray-100 text-gray-700 hover:bg-gray-200"
                                >
                                    4
                                </Button>
                                <Button
                                    onClick={() => inputDigit('5')}
                                    className="bg-gray-100 text-gray-700 hover:bg-gray-200"
                                >
                                    5
                                </Button>
                                <Button
                                    onClick={() => inputDigit('6')}
                                    className="bg-gray-100 text-gray-700 hover:bg-gray-200"
                                >
                                    6
                                </Button>
                                <Button
                                    onClick={() => performOperation('-')}
                                    className="bg-purple-600 text-white hover:bg-purple-700"
                                >
                                    −
                                </Button>

                                <Button
                                    onClick={() => inputDigit('1')}
                                    className="bg-gray-100 text-gray-700 hover:bg-gray-200"
                                >
                                    1
                                </Button>
                                <Button
                                    onClick={() => inputDigit('2')}
                                    className="bg-gray-100 text-gray-700 hover:bg-gray-200"
                                >
                                    2
                                </Button>
                                <Button
                                    onClick={() => inputDigit('3')}
                                    className="bg-gray-100 text-gray-700 hover:bg-gray-200"
                                >
                                    3
                                </Button>
                                <Button
                                    onClick={() => performOperation('+')}
                                    className="bg-purple-600 text-white hover:bg-purple-700"
                                >
                                    +
                                </Button>

                                <Button
                                    onClick={() => inputDigit('0')}
                                    className="col-span-2 bg-gray-100 text-gray-700 hover:bg-gray-200"
                                >
                                    0
                                </Button>
                                <Button
                                    onClick={inputDecimal}
                                    className="bg-gray-100 text-gray-700 hover:bg-gray-200"
                                >
                                    .
                                </Button>
                                <Button
                                    onClick={handleEqual}
                                    className="bg-gradient-to-r from-indigo-600 to-purple-600 text-white hover:opacity-90"
                                >
                                    =
                                </Button>
                            </div>
                        </div>

                        <p className="text-center text-gray-400 text-sm mt-6">
                            Simple Calculator
                        </p>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
